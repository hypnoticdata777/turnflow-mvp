<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Statistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="public/js/script.js" defer></script>
</head>

<body class="bg-gray-100">
  <div class="flex">

    <div id="sidebar-container"></div>

    <div class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-6">📊 Project Statistics</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="text-xl font-semibold mb-4">Tasks Completion Overview</h2>
          <canvas id="taskChart" style="max-height: 350px;"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="text-xl font-semibold mb-4">Project Costs</h2>
          <canvas id="costChart" style="max-height: 350px;"></canvas>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
