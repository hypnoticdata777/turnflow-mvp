<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurnFlow™ - Create Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Create New Turn Project</h1>

    <form id="project-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Project Name</label>
        <input type="text" id="projectName" class="mt-1 block w-full border rounded p-2" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Property Address</label>
          <input type="text" id="propertyAddress" class="mt-1 block w-full border rounded p-2" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Unit Number</label>
          <input type="text" id="unitNumber" class="mt-1 block w-full border rounded p-2" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Owner Name</label>
        <input type="text" id="ownerName" class="mt-1 block w-full border rounded p-2" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Target Completion</label>
        <input type="date" id="completionDate" class="mt-1 block w-full border rounded p-2" />
      </div>

      <div id="taskList" class="mt-6 space-y-4">
        <!-- Dynamic tasks will go here -->
      </div>

      <button type="button" id="addTaskBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">+ Add Task</button>

      <div class="mt-4">
        <strong>Estimated Total:</strong> <span id="totalCost">$0.00</span>
      </div>

      <button type="submit" class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Submit for Approval</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
