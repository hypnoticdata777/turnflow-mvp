<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurnFlow — Login</title>

  <!-- Ensures relative links resolve from this folder in any hosting path -->
  <base href="./">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- If already logged in, auto-redirect to their role home -->
  <script type="module">
    import { watchAuth } from './js/auth.js';
    watchAuth(true);
  </script>

  <style>
    /* tiny polish */
    .tf-card { max-width: 28rem }
    .tf-input { @apply w-full border rounded px-3 py-2; }
    .tf-btn   { @apply w-full rounded-xl py-2 text-white; }
  </style>
</head>
<body class="min-h-screen grid place-items-center bg-gray-50">

  <!-- LOGIN ONLY -->
  <div class="tf-card w-full bg-white p-8 rounded-2xl shadow">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold">TurnFlow™</h1>
      <p class="text-gray-500">Sign in to continue</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <input class="tf-input" type="email" placeholder="Email" required id="email">
      <input class="tf-input" type="password" placeholder="Password" required id="pass">
      <button class="tf-btn bg-black">Sign in</button>
    </form>

    <p id="err" class="text-red-600 text-sm mt-3"></p>
  </div>

  <!-- Firebase auth wiring -->
  <!-- NOTE: You don't need to import firebase-config.js here because js/auth.js already imports it. -->
  <script type="module">
    import { signIn, currentUser, getUserRole, roleHome } from './js/auth.js';

    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('err');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value.trim();

      try {
        await signIn(email, pass);
        const u = currentUser();
        const role = await getUserRole(u.uid);
        location.replace(roleHome(role)); // sends tech->technician.html, etc.
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
      }
    });
  </script>
</body>
</html>
