<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurnFlow — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tf-card { max-width: 28rem; }
    .tf-input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
    }
    .tf-btn {
      width: 100%;
      border-radius: 0.75rem;
      padding: 0.5rem 0;
      color: #fff;
      background: #000;
    }
  </style>
</head>

<body class="min-h-screen grid place-items-center bg-gray-50">
  <div class="tf-card w-full bg-white p-8 rounded-2xl shadow">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold">TurnFlow™</h1>
      <p class="text-gray-500">Sign in to continue</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <input id="email" class="tf-input" type="email" placeholder="Email" required>
      <input id="password" class="tf-input" type="password" placeholder="Password" required>
      <button class="tf-btn" type="submit">Sign in</button>
    </form>

    <p id="errorMessage" class="text-red-600 text-sm mt-3 text-center"></p>
  </div>
  
  <script type="module" src="public/js/firebase-config.js"></script>
  <script type="module" src="public/js/auth.js"></script>
</body>
</html>
