<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Turn Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" defer></script>
</head>

<body class="bg-gray-100">
  <div class="container">
    <div class="flex" id="layout">
      <aside id="sidebar" class="w-64 bg-gray-800 text-white h-screen p-4">
        <h2 class="text-2xl font-bold mb-6">TurnFlow™</h2>
        <ul>
          <li class="mb-3"><a href="dashboard.html" class="hover:text-green-400">📋 Dashboard</a></li>
          <li class="mb-3"><a href="pending-approval.html" class="hover:text-green-400">⏳ Pending Approval</a></li>
          <li class="mb-3"><a href="pending-send.html" class="hover:text-green-400">📤 Pending to Send</a></li>
          <li class="mb-3"><a href="index.html" class="hover:text-green-400">➕ New Project</a></li>
          <li class="mb-3"><a href="contacts.html" class="hover:text-green-400">👥 Contacts</a></li>
          <li class="mb-3"><a href="stats.html" class="hover:text-green-400">📊 Stats</a></li>
          <li class="mb-3"><a href="backup.html" class="hover:text-green-400">💾 Backup</a></li>
          <li class="mb-3"><a href="technician.html" class="hover:text-green-400">🛠 Technician</a></li>
        </ul>
      </aside>

      <main id="content" class="flex-1 p-6">
        <h1 class="text-3xl font-bold mb-4">Welcome to TurnFlow™</h1>
        <p class="text-gray-600">Select a section from the sidebar to get started.</p>
      </main>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">
      <div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold mb-4">Create New Turn Project</h1>

        <label class="block mb-2 font-semibold">Project Name</label>
        <input type="text" id="projectName" class="w-full border p-2 rounded mb-4" />

        <label class="block mb-2 font-semibold">Property Address</label>
        <input type="text" id="propertyAddress" class="w-full border p-2 rounded mb-4" />

        <label class="block mb-2 font-semibold">Unit Number</label>
        <input type="text" id="unitNumber" class="w-full border p-2 rounded mb-4" />

        <label class="block mb-2 font-semibold">Owner Name</label>
        <input type="text" id="ownerName" class="w-full border p-2 rounded mb-4" />

        <label class="block mb-2 font-semibold">Target Completion</label>
        <input type="date" id="completionDate" class="w-full border p-2 rounded mb-4" />

        <button id="addTaskBtn" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">+ Add Task</button>

        <div id="taskList"></div>

        <p class="font-bold mt-4">Estimated Total: <span id="totalEstimate">$0.00</span></p>

        <button id="saveProjectBtn" class="bg-green-600 text-white px-4 py-2 rounded mt-4">Submit for Approval</button>
      </div>
    </div>
  </div>

  <!-- Login (simple) -->
  <main class="card" style="max-width:420px;margin:auto">
    <h1>TurnFlow Login</h1>
    <form id="loginForm">
      <label>Email<br><input id="email" type="email" required></label>
      <label>Password<br><input id="password" type="password" required></label>
      <button type="submit">Sign In</button>
      <p id="err" style="color:#b00020"></p>
    </form>
  </main>

  <!-- Firebase wiring (single source of truth) -->
  <script type="module" src="./js/firebase-config.js"></script>
  <script type="module" src="./js/auth.js"></script>
  <script type="module">
    import { login, watchAuth } from "./js/auth.js";
    watchAuth(true); // after sign-in, redirect by role

    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const err = document.getElementById("err");

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); err.textContent = "";
      try { await login(email.value.trim(), password.value); }
      catch (ex) { err.textContent = ex.message; }
    });
  </script>
</body>
</html>
