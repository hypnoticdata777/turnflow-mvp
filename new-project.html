<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurnFlow — New Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="public/js/script.js" defer></script>

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { currentUser, getUserRole, roleHome } from './public/js/auth.js';

    // Block until we know who you are
    (async () => {
      const u = currentUser();
      if (!u) { location.replace('index.html'); return; }

      const role = await getUserRole(u.uid);
      if (!role) { location.replace('index.html'); return; }

      // only PM/Admin can create projects
      if (role !== 'pm' && role !== 'admin') {
        location.replace(roleHome(role));
        return;
      }
      // else, let the page render
    })();
  </script>
</head>

<body class="bg-gray-100">
  <div class="flex">
    
    <div id="sidebar-container"></div>

    <main class="flex-1 p-6">
      </main>
    
  </div>
</body>
</html>
