<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurnFlow — New Project</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module" src="public/js/script.js"></script>

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { currentUser, getUserRole, roleHome } from './public/js/auth.js';

    // Block until we know who you are
    (async () => {
      const u = currentUser();
      if (!u) { location.replace('index.html'); return; }

      const role = await getUserRole(u.uid);
      if (!role) { location.replace('index.html'); return; }

      // only PM/Admin can create projects
      if (role !== 'pm' && role !== 'admin') {
        location.replace(roleHome(role));
        return;
      }
      // else, let the page render
    })();
  </script>
</head>

<body class="bg-gray-100">
  <div class="flex">
    
    <div id="sidebar-container"></div>

    <main class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-6">🆕 Create New Project</h1>

      <div class="max-w-4xl bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-semibold mb-4">Project Details</h2>

        <div class="space-y-4 mb-6">
          <div>
            <label class="block text-sm font-medium mb-1">Project Name</label>
            <input id="projectName" type="text" class="w-full p-2 border rounded" placeholder="Enter project name" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Property Address</label>
            <input id="propertyAddress" type="text" class="w-full p-2 border rounded" placeholder="Enter property address" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Unit Number</label>
            <input id="unitNumber" type="text" class="w-full p-2 border rounded" placeholder="Enter unit number">
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Owner Name</label>
            <input id="ownerName" type="text" class="w-full p-2 border rounded" placeholder="Enter owner name" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Target Completion Date</label>
            <input id="completionDate" type="date" class="w-full p-2 border rounded" required>
          </div>
        </div>

        <hr class="my-6">

        <div class="mb-4">
          <h2 class="text-xl font-semibold mb-3">Tasks & Estimates</h2>
          <div id="taskList" class="space-y-3"></div>
          <button id="addTaskBtn" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">+ Add Task</button>
        </div>

        <div class="mt-6 text-xl font-bold">
          Total Estimate: <span id="totalEstimate" class="text-green-600">$0.00</span>
        </div>

        <div class="mt-6 flex gap-3">
          <button id="saveProjectBtn" class="bg-green-600 text-white px-6 py-2 rounded">💾 Save Project</button>
          <a href="dashboard.html" class="bg-gray-600 text-white px-6 py-2 rounded inline-block">⬅ Cancel</a>
        </div>
      </div>
    </main>
    
  </div>
</body>
</html>
