<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TurnFlow — New Project</title>

  <base href="./">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Auth guard: allow only PM/Admin; others get redirected to their home -->
  <script type="module">
    import { currentUser, getUserRole, roleHome } from './js/auth.js';

    // Block until we know who you are
    (async () => {
      const u = currentUser();
      if (!u) { location.replace('index.html'); return; }

      const role = await getUserRole(u.uid);
      if (!role) { location.replace('index.html'); return; }

      // only PM/Admin can create projects
      if (role !== 'pm' && role !== 'admin') {
        location.replace(roleHome(role));
        return;
      }
      // else, let the page render
    })();
  </script>
</head>
