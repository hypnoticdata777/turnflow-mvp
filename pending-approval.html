<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approval - TurnFlow™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="public/js/script.js" defer></script>
</head>

<body class="bg-gray-100">
  <div class="flex">
    
    <div id="sidebar-container"></div>

    <div class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-6">⏳ Projects Pending Approval</h1>
      <div id="projectList" class="space-y-4"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const projectList = document.getElementById("projectList");
      const projects = JSON.parse(localStorage.getItem("turnflow_projects")) || [];

      const filtered = projects.filter(p => p.status === "Pending Approval");

      if (filtered.length === 0) {
        projectList.innerHTML = `<p class="text-red-500">No projects pending approval.</p>`;
        return;
      }

      projectList.innerHTML = filtered.map(p => `
        <div class="border p-4 rounded bg-white shadow">
          <h2 class="text-xl font-semibold">${p.projectName}</h2>
          <p><strong>Owner:</strong> ${p.owner}</p>
          <p><strong>Address:</strong> ${p.address}, Unit ${p.unit}</p>
          <p><strong>Target Date:</strong> ${p.date}</p>
          <button onclick="viewProject(${p.id})" class="bg-blue-500 text-white px-3 py-1 rounded mt-2">View</button>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
