<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approval - TurnFlow™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="public/js/script.js"></script>
</head>

<body class="bg-gray-100">
  <div class="flex">

    <div id="sidebar-container"></div>

    <div class="flex-1 p-6">
      <header class="flex justify-end mb-4">
        <button id="logoutBtn" class="px-3 py-1 border rounded">Logout</button>
      </header>

      <h1 class="text-3xl font-bold mb-6">⏳ Projects Pending Approval</h1>
      <div id="projectList" class="space-y-4"></div>
    </div>
  </div>

  <script type="module">
    import { getProjectsByStatus } from './public/js/firestore-projects.js';
    import { escHtml } from './public/js/utils.js';

    document.addEventListener("DOMContentLoaded", async () => {
      const projectList = document.getElementById("projectList");
      projectList.innerHTML = `<p class="text-gray-500">Loading…</p>`;

      try {
        const filtered = await getProjectsByStatus("Pending Approval");

        if (filtered.length === 0) {
          projectList.innerHTML = `<p class="text-gray-500">No projects pending approval.</p>`;
          return;
        }

        projectList.innerHTML = filtered.map(p => `
          <div class="border p-4 rounded bg-white shadow">
            <h2 class="text-xl font-semibold">${escHtml(p.projectName)}</h2>
            <p><strong>Owner:</strong> ${escHtml(p.owner)}</p>
            <p><strong>Address:</strong> ${escHtml(p.address)}, Unit ${escHtml(p.unit)}</p>
            <p><strong>Target Date:</strong> ${escHtml(p.date)}</p>
            <button data-project-id="${escHtml(p.id)}" class="viewBtn bg-blue-500 text-white px-3 py-1 rounded mt-2">View</button>
          </div>
        `).join("");

        projectList.addEventListener("click", (e) => {
          const btn = e.target.closest("button.viewBtn");
          if (btn && btn.dataset.projectId) window.viewProject(btn.dataset.projectId);
        });
      } catch (error) {
        console.error("Error loading projects:", error);
        projectList.innerHTML = `<p class="text-red-500">Failed to load projects. Check your connection and try refreshing.</p>`;
      }
    });
  </script>

  <script type="module" src="public/js/firebase-config.js"></script>
  <script type="module" src="public/js/auth.js"></script>
  <script type="module">
    import { logout } from "./public/js/auth.js";
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
  </script>
</body>
</html>
