<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <base href="./">
</head>

<body class="bg-gray-100">

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { requireRole } from './public/js/auth.js';
    await requireRole('tech'); // if not tech or not logged in -> goes to index.html
  </script>

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { currentUser, logout } from './public/js/auth.js';
    document.addEventListener('DOMContentLoaded', () => {
      const u = currentUser();
      const hdr = document.createElement('header');
      hdr.className = 'w-full bg-white border-b p-3 flex items-center justify-between sticky top-0 z-50';
      hdr.innerHTML = `
        <div class="font-semibold">TurnFlow™ — Technician</div>
        <div class="text-sm flex items-center gap-3">
          <span class="text-gray-600">${u?.email ?? ''}</span>
          <button id="tf-logout" class="px-3 py-1 rounded bg-gray-800 text-white">Logout</button>
        </div>
      `;
      document.body.prepend(hdr);
      document.getElementById('tf-logout')?.addEventListener('click', async () => { await logout(); });
    });
  </script>

  <div class="flex">

    <div id="sidebar-container"></div>

    <main class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-6">🛠 Technician Dashboard</h1>

      <section class="max-w-5xl bg-white p-4 rounded shadow mb-6">
        <h2 class="text-xl font-semibold mb-3">My Projects</h2>
        <div id="tech-projects" class="space-y-4">
          <p class="text-gray-500">Loading…</p>
        </div>
      </section>

      <section class="max-w-3xl bg-white p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Upload Photos</h2>
        <label class="block mb-2">Project
          <select id="projectId" class="w-full border p-2 rounded bg-white">
            <option value="">— select a project —</option>
          </select>
        </label>
        <label class="block mb-4">Task
          <select id="taskId" class="w-full border p-2 rounded bg-white" disabled>
            <option value="">— select a task —</option>
          </select>
        </label>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">Before</h3>
            <input id="beforeInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="before" class="uploadBtn bg-blue-600 text-white px-3 py-1 rounded">Upload Before</button>
          </div>
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">After</h3>
            <input id="afterInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="after" class="uploadBtn bg-green-600 text-white px-3 py-1 rounded">Upload After</button>
          </div>
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">Receipt</h3>
            <input id="receiptInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="receipt" class="uploadBtn bg-yellow-600 text-white px-3 py-1 rounded">Upload Receipt</button>
          </div>
        </div>
        <progress id="prog" value="0" max="100" class="w-full mt-4"></progress>
        <p id="status" class="text-sm mt-1 text-gray-600"></p>
      </section>

      <section class="max-w-5xl bg-white p-4 rounded shadow mt-6">
        <h2 class="text-xl font-semibold mb-3">Gallery</h2>
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./public/js/auth.js"></script>
  <script type="module" src="./public/js/technician.js"></script>

  <script type="module">
    import { db } from './public/js/firebase-config.js';
    import { currentUser } from './public/js/auth.js';
    import { escHtml } from './public/js/utils.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

    const u = currentUser();
    const listContainer = document.getElementById('tech-projects');
    const projectSelect = document.getElementById('projectId');
    const taskSelect = document.getElementById('taskId');

    // Keyed by Firestore doc ID so the task select can be populated on demand
    const projectCache = {};

    function populateTaskSelect(projectId) {
      taskSelect.innerHTML = '<option value="">— select a task —</option>';
      taskSelect.disabled = true;
      const tasks = projectCache[projectId]?.tasks || [];
      tasks.forEach((t, i) => {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = t.name || `Task ${i + 1}`;
        taskSelect.appendChild(opt);
      });
      taskSelect.disabled = tasks.length === 0;
    }

    projectSelect.addEventListener('change', () => {
      populateTaskSelect(projectSelect.value);
      // Reset task select and trigger gallery update via the existing technician.js listener
      taskSelect.value = '';
      taskSelect.dispatchEvent(new Event('change'));
    });

    async function loadProjectsForTech() {
      if (!u) {
        listContainer.innerHTML = '<p class="text-red-500">User not found. Cannot load projects.</p>';
        return;
      }
      listContainer.innerHTML = '<p class="text-gray-500">Loading…</p>';

      try {
        const q = query(
          collection(db, 'projects'),
          where('assignedTechId', '==', u.uid)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          listContainer.innerHTML = '<p class="text-gray-500">No projects assigned to you.</p>';
          return;
        }

        listContainer.textContent = '';
        snap.forEach(docSnap => {
          const p = docSnap.data();
          projectCache[docSnap.id] = p;

          // Populate the upload-section project dropdown
          const opt = document.createElement('option');
          opt.value = docSnap.id;
          opt.textContent = p.projectName || p.name || docSnap.id;
          projectSelect.appendChild(opt);

          // Build task list using safe DOM methods
          const taskList = document.createElement('ul');
          taskList.className = 'list-disc ml-5';
          (p.tasks || []).forEach(t => {
            const li = document.createElement('li');
            const statusSpan = document.createElement('span');
            statusSpan.className = 'text-gray-600';
            statusSpan.textContent = t.completed ? 'Completed' : 'Pending';
            li.textContent = `${t.name || '(unnamed task)'} — `;
            li.appendChild(statusSpan);
            taskList.appendChild(li);
          });

          // Build card using escHtml for user-controlled values
          const card = document.createElement('div');
          card.className = 'bg-white border rounded-xl p-4 shadow-sm';
          card.innerHTML = `
            <h3 class="text-lg font-semibold mb-1">${escHtml(p.projectName || p.name || 'Project')}</h3>
            <p class="text-sm"><strong>Address:</strong> ${escHtml(p.address || '')}${p.unit ? ', Unit ' + escHtml(p.unit) : ''}</p>
            <p class="text-sm"><strong>Owner:</strong> ${escHtml(p.owner || p.ownerName || '')}</p>
            <p class="text-sm mb-2"><strong>Target Date:</strong> ${escHtml(p.date || p.targetDate || '')}</p>
            <div class="mt-2"><strong>Tasks:</strong></div>
          `;
          card.lastElementChild.appendChild(taskList);
          listContainer.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading projects for technician:', error);
        listContainer.innerHTML = '<p class="text-red-500">Failed to load projects. Check your connection and try refreshing.</p>';
      }
    }

    loadProjectsForTech();
  </script>
</body>
</html>
