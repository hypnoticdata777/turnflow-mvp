<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <base href="./">
</head>

<body class="bg-gray-100">

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { requireRole } from './public/js/auth.js';
    await requireRole('tech'); // if not tech or not logged in -> goes to index.html
  </script>

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { currentUser, logout } from './public/js/auth.js';
    document.addEventListener('DOMContentLoaded', () => {
      const u = currentUser();
      const hdr = document.createElement('header');
      hdr.className = 'w-full bg-white border-b p-3 flex items-center justify-between sticky top-0 z-50';
      hdr.innerHTML = `
        <div class="font-semibold">TurnFlow™ — Technician</div>
        <div class="text-sm flex items-center gap-3">
          <span class="text-gray-600">${u?.email ?? ''}</span>
          <button id="tf-logout" class="px-3 py-1 rounded bg-gray-800 text-white">Logout</button>
        </div>
      `;
      document.body.prepend(hdr);
      document.getElementById('tf-logout')?.addEventListener('click', async () => { await logout(); });
    });
  </script>

  <div class="flex">

    <div id="sidebar-container"></div>

    <main class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-6">🛠 Technician Dashboard</h1>

      <section class="max-w-5xl bg-white p-4 rounded shadow mb-6">
        <h2 class="text-xl font-semibold mb-3">My Projects</h2>
        <div id="tech-projects" class="space-y-4">
          <p class="text-gray-500">Loading…</p>
        </div>
      </section>

      <section class="max-w-3xl bg-white p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Upload Photos</h2>
        <label class="block mb-2">Project ID
          <input id="projectId" class="w-full border p-2 rounded" placeholder="e.g. TUR-001" required>
        </label>
        <label class="block mb-4">Task ID
          <input id="taskId" class="w-full border p-2 rounded" placeholder="e.g. TAS-001" required>
        </label>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">Before</h3>
            <input id="beforeInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="before" class="uploadBtn bg-blue-600 text-white px-3 py-1 rounded">Upload Before</button>
          </div>
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">After</h3>
            <input id="afterInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="after" class="uploadBtn bg-green-600 text-white px-3 py-1 rounded">Upload After</button>
          </div>
          <div class="border p-3 rounded">
            <h3 class="font-medium mb-2">Receipt</h3>
            <input id="receiptInput" type="file" accept="image/*" capture="environment" class="mb-2">
            <button data-type="receipt" class="uploadBtn bg-yellow-600 text-white px-3 py-1 rounded">Upload Receipt</button>
          </div>
        </div>
        <progress id="prog" value="0" max="100" class="w-full mt-4"></progress>
        <p id="status" class="text-sm mt-1 text-gray-600"></p>
      </section>

      <section class="max-w-5xl bg-white p-4 rounded shadow mt-6">
        <h2 class="text-xl font-semibold mb-3">Gallery</h2>
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./public/js/auth.js"></script>
  <script type="module" src="./public/js/technician.js"></script>

  <script type="module">
    // ✅ UPDATED IMPORT PATH
    import { db, currentUser } from './public/js/auth.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

    const u = currentUser();
    const listContainer = document.getElementById('tech-projects');

    async function loadProjectsForTech() {
      if (!u) {
        listContainer.innerHTML = '<p class="text-red-500">User not found. Cannot load projects.</p>';
        return;
      }
      listContainer.innerHTML = '<p class="text-gray-500">Loading…</p>';

      const q = query(
        collection(db, 'projects'),
        where('assignedTechId', '==', u.uid)
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        listContainer.innerHTML = '<p class="text-gray-500">No projects available.</p>';
        return;
      }

      listContainer.innerHTML = '';
      snap.forEach(docSnap => {
        const p = docSnap.data();
        const card = document.createElement('div');
        card.className = 'bg-white border rounded-xl p-4 shadow-sm';
        card.innerHTML = `
          <h3 class="text-lg font-semibold mb-1">${p.name || 'Project'}</h3>
          <p class="text-sm"><strong>Address:</strong> ${p.address || ''} ${p.unit ? ', Unit ' + p.unit : ''}</p>
          <p class="text-sm"><strong>Owner:</strong> ${p.ownerName || ''}</p>
          <p class="text-sm mb-2"><strong>Target Date:</strong> ${p.targetDate || ''}</p>
          <div class="mt-2">
            <strong>Tasks:</strong>
            <ul class="list-disc ml-5">
              ${(p.tasks || []).map(t => `<li>${t.title} — <span class="text-gray-600">${t.status}</span></li>`).join('')}
            </ul>
          </div>
        `;
        listContainer.appendChild(card);
      });
    }

    loadProjectsForTech();
  </script>
</body>
</html>
