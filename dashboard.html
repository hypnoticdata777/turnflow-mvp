<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turn Project Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">📋 Project Dashboard</h1>
    <div id="projectList" class="space-y-4 text-gray-800"></div>
  </div>

  <script>
    const projectList = document.getElementById("projectList");
    const allProjects = JSON.parse(localStorage.getItem("turnflow_projects")) || [];

    if (allProjects.length === 0) {
      projectList.innerHTML = `<p class="text-red-500">No projects saved yet.</p>`;
    } else {
      allProjects.forEach(project => {
        const total = project.tasks.reduce((sum, task) => {
          return sum + (task.hours * task.rate + task.material);
        }, 0);

        const div = document.createElement("div");
        div.classList = "border p-4 rounded bg-gray-50";

        div.innerHTML = `
          <h2 class="font-semibold text-xl">${project.projectName} (${project.owner})</h2>
          <p><strong>Address:</strong> ${project.address}, Unit ${project.unit}</p>
          <p><strong>Target Date:</strong> ${project.date}</p>
          <p><strong>Tasks:</strong> ${project.tasks.length}</p>
          <p><strong>Total Estimate:</strong> $${total.toFixed(2)}</p>
          <button class="mt-2 bg-blue-600 text-white px-4 py-1 rounded" onclick="viewProject(${project.id})">View Estimate</button>
        `;

        projectList.appendChild(div);
      });
    }

    function viewProject(id) {
      const all = JSON.parse(localStorage.getItem("turnflow_projects")) || [];
      const selected = all.find(p => p.id === id);
      localStorage.setItem("turnflow_project", JSON.stringify(selected));
      localStorage.setItem("turnflow_tasks", JSON.stringify(selected.tasks));
      window.location.href = "estimate.html";
    }
  </script>
</body>
</html>
