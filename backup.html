<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backup Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="public/js/script.js" defer></script>
</head>

<body class="bg-gray-100">
  <div class="flex">
    
    <div id="sidebar-container"></div>

    <div class="flex-1 p-6">
      <div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold mb-6">Backup & Restore Projects</h1>

        <button id="backupBtn" class="bg-blue-500 text-white px-4 py-2 rounded mb-4 w-full">
          📥 Download Backup (JSON)
        </button>

        <h2 class="text-xl font-semibold mb-2">Restore from Backup</h2>
        <input type="file" id="fileInput" class="mb-4" accept=".json" />
        <button id="restoreBtn" class="bg-green-600 text-white px-4 py-2 rounded w-full">
          📤 Restore Backup
        </button>

        <p id="statusMsg" class="mt-4 text-gray-700"></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const backupBtn = document.getElementById("backupBtn");
      const restoreBtn = document.getElementById("restoreBtn");
      const fileInput = document.getElementById("fileInput");
      const statusMsg = document.getElementById("statusMsg");

      // Download JSON Backup
      backupBtn.addEventListener("click", () => {
        const projects = localStorage.getItem("turnflow_projects") || "[]";
        const blob = new Blob([projects], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "turnflow_backup.json";
        a.click();
        URL.revokeObjectURL(url);
      });

      // Restore JSON Backup
      restoreBtn.addEventListener("click", () => {
        const file = fileInput.files[0];
        if (!file) {
          statusMsg.textContent = "❌ Please select a JSON file first.";
          statusMsg.className = "text-red-500";
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
              localStorage.setItem("turnflow_projects", JSON.stringify(data));
              statusMsg.textContent = "✅ Backup restored! Refresh dashboard.";
              statusMsg.className = "text-green-600";
            } else {
              throw new Error("Invalid format");
            }
          } catch {
            statusMsg.textContent = "❌ Invalid JSON file.";
            statusMsg.className = "text-red-500";
          }
        };

        reader.readAsText(file);
      });
    });
  </script>
</body>
</html>
