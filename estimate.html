<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Estimate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="public/js/script.js"></script>
</head>

<body class="bg-gray-100">
  <div class="flex">

    <div id="sidebar-container"></div>

    <div class="flex-1 p-6">
      <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
        
        <div id="projectInfo" class="mb-6 text-gray-700"></div>

        <h2 class="text-2xl font-semibold mb-2">Tasks</h2>
        <div id="taskSummary" class="space-y-4 text-gray-800"></div>

        <div class="mt-6 text-xl font-bold">
          Total Estimate: <span id="finalEstimate" class="text-green-600">$0.00</span>
        </div>

        <button onclick="downloadPDF()" class="mt-6 bg-green-600 text-white px-4 py-2 rounded">
          📄 Download PDF
        </button>

        <a href="dashboard.html" class="ml-3 bg-gray-600 text-white px-4 py-2 rounded">⬅ Back to Dashboard</a>
      </div>
    </div>
  </div>
    
  <script type="module">
    import { getProject } from './public/js/firestore-projects.js';

    const { jsPDF } = window.jspdf;
    let projectData = null;
    let taskData = null;

    const projectInfoDiv = document.getElementById("projectInfo");
    const taskSummaryDiv = document.getElementById("taskSummary");
    const finalEstimateSpan = document.getElementById("finalEstimate");

    // Get project ID from sessionStorage
    const projectId = sessionStorage.getItem("viewing_project_id");

    if (projectId) {
      try {
        projectData = await getProject(projectId);
        taskData = projectData.tasks || [];

        projectInfoDiv.innerHTML = `
          <p><strong>Project:</strong> ${projectData.projectName}</p>
          <p><strong>Address:</strong> ${projectData.address}, Unit ${projectData.unit}</p>
          <p><strong>Owner:</strong> ${projectData.owner}</p>
          <p><strong>Target Completion:</strong> ${projectData.date}</p>
        `;

        let grandTotal = 0;

        taskData.forEach((task, index) => {
          const cost = (task.hours * task.rate) + task.material;
          grandTotal += cost;

          taskSummaryDiv.innerHTML += `
            <div class="border p-4 rounded bg-gray-50">
              <h3 class="font-semibold mb-1">Task #${index + 1}: ${task.name}</h3>
              <p><strong>Labor:</strong> ${task.hours} hrs @ $${task.rate}/hr = $${(task.hours * task.rate).toFixed(2)}</p>
              <p><strong>Materials:</strong> $${task.material.toFixed(2)}</p>
              <p><strong>Total:</strong> $${cost.toFixed(2)}</p>
            </div>
          `;
        });

        finalEstimateSpan.textContent = `$${grandTotal.toFixed(2)}`;
      } catch (error) {
        console.error("Error loading project:", error);
        projectInfoDiv.innerHTML = `<p class="text-red-500">Error loading project data.</p>`;
      }
    } else {
      projectInfoDiv.innerHTML = `<p class="text-red-500">No project selected.</p>`;
    }

    window.downloadPDF = function() {
      if (!projectData || !taskData) return;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("Turn Estimate Summary", 10, 10);
      doc.setFontSize(12);

      doc.text(`Project: ${projectData.projectName}`, 10, 20);
      doc.text(`Address: ${projectData.address}, Unit ${projectData.unit}`, 10, 30);
      doc.text(`Owner: ${projectData.owner}`, 10, 40);
      doc.text(`Target Completion: ${projectData.date}`, 10, 50);

      let y = 70;
      taskData.forEach((task, i) => {
        doc.text(`Task ${i + 1}: ${task.name}`, 10, y); y += 10;
        doc.text(`Labor: ${task.hours} hrs @ $${task.rate}/hr`, 10, y); y += 10;
        doc.text(`Materials: $${task.material}`, 10, y); y += 10;
      });

      doc.text(`Total Estimate: $${finalEstimateSpan.textContent}`, 10, y + 10);
      doc.save("estimate.pdf");
    }
  </script>
</body>
</html>
